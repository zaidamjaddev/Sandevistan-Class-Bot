services:
  evolution-api:
    container_name: evo_sandevistan
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - evolution-postgres
      - evolution-redis
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - sandevistan_net

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sandevistan_net

  evolution-redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis:/data
    networks:
      - sandevistan_net

  n8n:
    container_name: n8n_sandevistan
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - sandevistan_net

networks:
  sandevistan_net:
    driver: bridge

volumes:
  evolution_instances:
  postgres_data:
  evolution_redis:
  n8n_data:
